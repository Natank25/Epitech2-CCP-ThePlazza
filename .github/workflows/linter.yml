name: "Linter"
on:
  workflow_call:
  push:
    paths: ['**.c', '**.cpp', '**.h', '**.hpp', '**CMakeLists.txt']
  pull_request:
    paths: ['**.c', '**.cpp', '**.h', '**.hpp', '**CMakeLists.txt']


jobs:
  linter:
    runs-on: self-hosted
    container:
      image: epitechcontent/epitest-docker:latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: "Generate compilation_command.json"
        run: |
          cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=1 . -G 'Unix Makefiles'
      - uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: 'file'
          tidy-checks: ''
          #database: 'build'
          thread-comments: ${{ github.event_name == 'pull_request' && 'update' }}
          extra-args: '-std=c++20 -Wall'
          step-summary: 'true'
          tidy-review: 'true'
          format-review: 'true'
      - name: Debug clang-format on PR
        run: |
          set -o pipefail
          echo "GIT INFO"
          git rev-parse --abbrev-ref HEAD || true
          git rev-parse HEAD || true
          git log -1 --stat || true
          echo "--- ls -la ---"
          ls -la include/Ingredient.hpp || true
      
          echo
          echo "clang-format versions available:"
          /usr/bin/clang-format-20 --version || true
          /__w/_actions/cpp-linter/cpp-linter-action/v2/.venv/bin/clang-format --version || true
      
          echo
          echo "Run clang-format as the action does and capture stderr/stdout"
          /usr/bin/clang-format-20 -style=file include/Ingredient.hpp > /tmp/clang_fmt_out 2> /tmp/clang_fmt_err || {
            echo "clang-format-20 exit $?"
            echo "=== stderr ==="
            sed -n '1,200p' /tmp/clang_fmt_err || true
            echo "=== head of file (first 200 lines) ==="
            sed -n '1,200p' include/Ingredient.hpp || true
            echo "=== hexdump (first 256 bytes) ==="
            hexdump -C -n 256 include/Ingredient.hpp || true
            exit 1
          }
          echo "clang-format-20 exited 0"
      - name: Fail fast?!
        if: steps.linter.outputs.checks-failed > 0
        run: exit 1